syntax = "proto3";

package grafeas.v1;

option go_package = "github.com/grafeas/grafeas/proto/v1/grafeas_go_proto";
option java_multiple_files = true;
option java_package = "io.grafeas.v1";
option objc_class_prefix = "GRA";

message AISkillAnalysisNote {}

message AISkillAnalysisOccurrence {
  message Finding {
    string rule_id = 1;
    string category = 2;
    string severity = 3;
    string title = 4;
    string description = 5;
    string file_path = 6;
    string snippet = 7;
  }

  string skill_name = 1;
  repeated Finding findings = 2;
}
